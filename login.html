<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar Anggota - lentera barusku</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="register-body">

<div class="register-container">
    <h2>Pendaftaran Anggota</h2>
    <p>Silakan lengkapi data diri Anda untuk menjadi anggota perpustakaan</p>

    <form onsubmit="registerMember(event)">
        <div class="input-group">
            <input type="text" id="firstName" placeholder="First Name" required>
            <input type="text" id="lastName" placeholder="Last Name" required>
        </div>

        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="phone" placeholder="No. Handphone" required>

        <button type="submit" class="btn-register">Daftar Sekarang</button>
    </form>

    <p class="back-login">
        Sudah punya akun? <a href="login.html">Login di sini</a>
    </p>
</div>

<script src="js/script.js"></script>
</body>
</html>
